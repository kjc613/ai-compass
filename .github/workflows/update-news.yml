name: Update AI news

于:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NEWS_LIMIT: 60

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Update news data
        run: npm run update-news

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: update ai news"
          file_pattern: data/news.json assets/site-data.js
